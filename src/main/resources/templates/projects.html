<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>EA Project Portfolio</title><link rel="stylesheet" href="/css/app.css"></head><body><nav th:replace="~{fragments :: nav}"></nav><main><header class="row"><div><p class="eyebrow">ENTERPRISE PORTFOLIO</p><h1>Projects</h1><p>Architecture governance, ownership, review stage and assurance requirements.</p></div><a class="primary" href="/projects/new">+ Add project</a></header><p class="success" th:if="${message}" th:text="${message}"></p><section class="cards project-cards"><a class="card" th:each="p:${projects}" th:href="@{/projects/{id}(id=${p.id})}"><span th:text="${p.code?:'NO CODE'}"></span><strong class="project-name" th:text="${p.name}"></strong><span class="pill" th:text="${p.stage}"></span><small th:text="${(p.leadArchitect?:'Architect not assigned')+' · Risk: '+(p.overallRisk?:'Not rated')}"></small></a></section><section class="panel" th:if="${projects.empty}"><p>No projects yet. Add the first project to begin governance.</p></section></main></body></html>
