<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title th:text="${type}+' register'"></title><link rel="stylesheet" href="/css/app.css"></head><body><nav th:replace="~{fragments :: nav}"></nav><main><header class="row"><div><p class="eyebrow">ENTERPRISE REGISTER</p><h1 th:text="${type}"></h1><p>Records can belong to a project or remain enterprise-wide.</p></div><a class="primary" th:href="@{/catalog/{t}/new(t=${type})}">+ Add record</a></header><p class="success" th:if="${message}" th:text="${message}"></p><section class="panel table-wrap"><table><thead><tr><th>Name</th><th>Project</th><th>Owner</th><th>Status</th><th>Criticality</th><th>Classification</th><th></th></tr></thead><tbody><tr th:each="x:${items}"><td><b th:text="${x.name}"></b><small th:text="${x.description}"></small></td><td th:text="${x.project!=null?x.project.name:'Enterprise-wide'}"></td><td th:text="${x.owner?:'-'}"></td><td><span class="pill" th:text="${x.status}"></span></td><td th:text="${x.criticality?:'-'}"></td><td th:text="${x.classification?:'-'}"></td><td><a th:href="@{/catalog/{t}/{id}(t=${type},id=${x.id})}">Edit</a></td></tr><tr th:if="${items.empty}"><td colspan="7" class="empty">No records yet.</td></tr></tbody></table></section></main></body></html>
