<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>MPM CRM Dashboard</title><link rel="stylesheet" href="/css/app.css"></head><body><nav th:replace="~{fragments :: nav}"></nav><main><header><p class="eyebrow">DYNAMICS 365 · PROPERTY LEASING</p><h1>MPM CRM project governance</h1><p>Solution scope, platform decisions, design assurance, risks and integrations in one place.</p></header><section class="cards"><a class="card" th:each="c:${counts}" th:href="@{/catalog/{t}(t=${c.key})}"><span th:text="${c.key}"></span><strong th:text="${c.value}"></strong><small>View register</small></a></section><section class="split"><article class="panel"><h2>Project indicators</h2><div class="metric"><span>Approved records</span><b th:text="${approved}"></b></div><div class="metric warning"><span>Deprecated platform items</span><b th:text="${deprecated}"></b></div></article><article class="panel"><h2>Recent activity</h2><p th:if="${recent.empty}">No activity yet.</p><div class="activity" th:each="e:${recent}"><b th:text="${e.action+' - '+e.entityType}"></b><span th:text="${e.detail}"></span></div></article></section></main></body></html>
