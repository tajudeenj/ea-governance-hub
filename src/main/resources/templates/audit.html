<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Audit trail</title><link rel="stylesheet" href="/css/app.css"></head><body><nav th:replace="~{fragments :: nav}"></nav><main><header><p class="eyebrow">ASSURANCE</p><h1>Immutable audit trail</h1><p>The latest 100 recorded changes.</p></header><section class="panel table-wrap"><table><thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Record</th><th>Detail</th></tr></thead><tbody><tr th:each="e:${events}"><td th:text="${#temporals.format(e.occurredAt,'dd MMM yyyy HH:mm')}"></td><td th:text="${e.actor}"></td><td th:text="${e.action}"></td><td th:text="${e.entityType+' #'+e.entityId}"></td><td th:text="${e.detail}"></td></tr></tbody></table></section></main></body></html>
